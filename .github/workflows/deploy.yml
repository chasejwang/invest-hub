name: Deploy Invest Hub

on:
  # 手动触发
  workflow_dispatch:
  # 每天收盘后自动跑（北京时间 21:00 = UTC 13:00）
  schedule:
    - cron: '0 13 * * 1-5'
  # push 到 main 时也跑（用户本地推代码后自动部署）
  push:
    branches: [main]
    paths:
      - 'knowledge-base/**'
      - 'site/**'
      - 'scripts/**'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build site
        run: python3 scripts/build_site.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Done
        run: |
          echo "✅ Deploy complete"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"
